apiVersion: apps/v1
kind: Deployment
metadata:
  name: coin-manager-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: coin-manager-frontend
  template:
    metadata:
      labels:
        app: coin-manager-frontend
    spec:
      containers:
        - image: rafaelor20/coin-manager-nginx
          name: coin-manager-frontend
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          ports:
            - containerPort: 80
              name: http
          volumeMounts:
            - name: config
              mountPath: /usr/src/app/dist/config.js
              subPath: config.js
      volumes:
        - name: config
          configMap:
            name: frontend-config
---
apiVersion: v1
kind: Service
metadata:
  name: coin-manager-frontend
spec:
  selector:
    app: coin-manager-frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
---
apiVersion: networking.k8s.io/v1beta1
kind: Ingress
metadata:
  name: coin-manager-frontend
  annotations:
    kubernetes.io/ingress.class: addon-http-application-routing
spec:
  rules:
    - host: <hostname>
      http:
        paths:
          - path: /
            backend:
              serviceName: coin-manager-frontend
              servicePort: http
