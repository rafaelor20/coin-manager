apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: coin-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: rafaelor20/coin_manager_db:v2
          ports:
            - containerPort: 5432
          envFrom:
            - configMapRef:
                name: backend-env
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgres-pvc
